name: 📧 Weekly Energy Report

on:
  schedule:
    - cron: "0 23 * * 0"   # 일요일 23:00 UTC = 월요일 08:00 KST
  workflow_dispatch:         # 수동 테스트 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 📧 주간 리포트 메일 발송
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python3 - << 'PYEOF'
import smtplib, json, os, datetime
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText

# ── 설정 ─────────────────────────────────
GMAIL_USER  = os.environ["GMAIL_USER"]
GMAIL_PW    = os.environ["GMAIL_APP_PW"]
TO          = os.environ["REPORT_TO"]
DASHBOARD   = "https://kimjiui.github.io/energy-dashboard"
TODAY       = datetime.date.today()
WEEK        = TODAY.isocalendar()[1]

# ── 데이터 읽기 ───────────────────────────
try:
    with open("data/dashboard_data.json","r",encoding="utf-8") as f:
        data = json.load(f)
    updated = data.get("meta",{}).get("updated_at","최근")
    dams    = data.get("dams",{})
    plan    = data.get("plan",{})
except:
    updated = str(TODAY)
    dams    = {}
    plan    = {}

# ── 댐 저수율 현황 ─────────────────────────
dam_rows = ""
danger_dams = []
for name, info in dams.items():
    rate = info.get("rate")
    if rate is None:
        continue
    color  = "#10B981" if rate >= 60 else "#F59E0B" if rate >= 40 else "#EF4444"
    status = "안정" if rate >= 60 else "주의" if rate >= 40 else "⚠️ 위험"
    if rate < 40:
        danger_dams.append(f"{name}댐({rate}%)")
    dam_rows += f"""
        <tr>
          <td style="padding:8px 12px;font-weight:600">{name}댐</td>
          <td style="padding:8px 12px;color:{color};font-weight:700;font-family:monospace">{rate}%</td>
          <td style="padding:8px 12px;color:{color}">{status}</td>
        </tr>"""

# ── 발전량 최신 실적 ───────────────────────
gen = plan.get("generation",{})
years = plan.get("years",[])
actual_until = plan.get("actual_until", 2023)
yi = years.index(actual_until) if actual_until in years else -1

def gwh(src):
    v = gen.get(src,[])
    return f"{v[yi]:.1f}" if yi >= 0 and yi < len(v) else "—"

nuclear_gwh = gwh("nuclear")
coal_gwh    = gwh("coal")
lng_gwh     = gwh("lng")
renew_gwh   = gwh("renew")

# ── 위험 댐 알림 ──────────────────────────
alert_box = ""
if danger_dams:
    names = ", ".join(danger_dams)
    alert_box = f"""
    <div style="background:#FEF2F2;border-left:4px solid #EF4444;padding:14px 18px;margin:16px 0;border-radius:6px;">
      <strong style="color:#EF4444">⚠️ 긴급 알림: 저수율 40% 미만 댐</strong><br>
      <span style="color:#7F1D1D;margin-top:4px;display:block">{names}</span>
    </div>"""

# ── HTML 메일 본문 ─────────────────────────
html = f"""
<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#F8FAFC;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;">
<div style="max-width:640px;margin:0 auto;padding:20px;">

  <!-- 헤더 -->
  <div style="background:linear-gradient(135deg,#0A0F1E,#1E293B);border-radius:12px 12px 0 0;padding:28px 32px;">
    <div style="color:#38BDF8;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:6px">
      WEEKLY ENERGY REPORT · {WEEK}주차
    </div>
    <div style="color:#F1F5F9;font-size:22px;font-weight:900;line-height:1.3">
      🇰🇷 대한민국 에너지 Mix<br>주간 현황 리포트
    </div>
    <div style="color:#64748B;font-size:12px;margin-top:8px">
      {TODAY.strftime('%Y년 %m월 %d일')} 기준 · 데이터 수집: {updated}
    </div>
  </div>

  <!-- 본문 -->
  <div style="background:#ffffff;border:1px solid #E2E8F0;border-top:none;padding:28px 32px;">
    {alert_box}

    <!-- 대시보드 바로가기 -->
    <div style="text-align:center;margin:0 0 28px;">
      <a href="{DASHBOARD}" style="display:inline-block;padding:13px 32px;
        background:#38BDF8;color:#0A0F1E;border-radius:8px;
        font-weight:700;font-size:14px;text-decoration:none;">
        📊 대시보드 바로 열기
      </a>
      <div style="color:#94A3B8;font-size:11px;margin-top:8px">{DASHBOARD}</div>
    </div>

    <!-- 구분선 -->
    <hr style="border:none;border-top:1px solid #E2E8F0;margin:0 0 24px;">

    <!-- 에너지 Mix 현황 -->
    <div style="margin-bottom:28px;">
      <div style="font-size:15px;font-weight:800;color:#1E293B;margin-bottom:14px;">
        ⚡ 에너지 Mix 현황 ({actual_until}년 실적, TWh)
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#F1F5F9;">
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#64748B">에너지원</th>
          <th style="padding:8px 12px;text-align:right;font-size:12px;color:#64748B">발전량(TWh)</th>
        </tr>
        <tr><td style="padding:8px 12px;border-bottom:1px solid #F1F5F9">⚛️ 원자력</td><td style="padding:8px 12px;text-align:right;font-weight:700;color:#3B82F6">{nuclear_gwh}</td></tr>
        <tr><td style="padding:8px 12px;border-bottom:1px solid #F1F5F9">🏭 석탄</td><td style="padding:8px 12px;text-align:right;font-weight:700;color:#6B7280">{coal_gwh}</td></tr>
        <tr><td style="padding:8px 12px;border-bottom:1px solid #F1F5F9">🔥 LNG</td><td style="padding:8px 12px;text-align:right;font-weight:700;color:#F59E0B">{lng_gwh}</td></tr>
        <tr><td style="padding:8px 12px;">🌿 재생에너지</td><td style="padding:8px 12px;text-align:right;font-weight:700;color:#10B981">{renew_gwh}</td></tr>
      </table>
    </div>

    <hr style="border:none;border-top:1px solid #E2E8F0;margin:0 0 24px;">

    <!-- 댐 저수율 -->
    <div style="margin-bottom:28px;">
      <div style="font-size:15px;font-weight:800;color:#1E293B;margin-bottom:14px;">
        💧 주요 댐 저수율 현황
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#F1F5F9;">
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#64748B">댐명</th>
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#64748B">저수율</th>
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#64748B">상태</th>
        </tr>
        {dam_rows if dam_rows else '<tr><td colspan="3" style="padding:12px;color:#94A3B8;text-align:center">데이터 없음</td></tr>'}
      </table>
      <div style="font-size:11px;color:#94A3B8;margin-top:8px">
        🟢 60% 이상: 안정 &nbsp;·&nbsp; 🟡 40~60%: 주의 &nbsp;·&nbsp; 🔴 40% 미만: 위험
      </div>
    </div>

    <hr style="border:none;border-top:1px solid #E2E8F0;margin:0 0 24px;">

    <!-- 데이터 출처 -->
    <div style="font-size:11px;color:#94A3B8;line-height:1.7;">
      📋 <strong>데이터 출처</strong><br>
      · 발전량: EPSIS 전력통계정보시스템 (epsis.kpx.or.kr)<br>
      · 전망: 제11차 전력수급기본계획 (산업통상자원부, 2025.02)<br>
      · 댐 저수율: K-water 한국수자원공사<br>
      · 자동 수집: GitHub Actions 매일 09:00 KST
    </div>
  </div>

  <!-- 푸터 -->
  <div style="background:#F8FAFC;border:1px solid #E2E8F0;border-top:none;border-radius:0 0 12px 12px;
    padding:16px 32px;text-align:center;">
    <div style="font-size:11px;color:#94A3B8;">
      이 메일은 매주 월요일 오전 8시에 자동 발송됩니다.<br>
      대시보드: <a href="{DASHBOARD}" style="color:#38BDF8">{DASHBOARD}</a>
    </div>
  </div>

</div>
</body>
</html>
"""

# ── 메일 발송 ─────────────────────────────
msg = MIMEMultipart("alternative")
msg["Subject"] = f"[에너지 대시보드] {TODAY.strftime('%m/%d')} 주간 전력·용수 현황 리포트"
msg["From"]    = f"에너지 대시보드 <{GMAIL_USER}>"
msg["To"]      = TO
msg.attach(MIMEText(html, "html", "utf-8"))

try:
    with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
        server.login(GMAIL_USER, GMAIL_PW)
        server.sendmail(GMAIL_USER, TO, msg.as_bytes())
    print(f"✅ 메일 발송 완료: {TO}")
    print(f"   제목: {msg['Subject']}")
except Exception as e:
    print(f"❌ 발송 실패: {e}")
    raise

PYEOF
