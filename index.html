<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 대한민국 에너지 Mix 인터랙티브 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#0A0F1E;--card:#111827;--border:rgba(255,255,255,0.07);--text:#F1F5F9;--muted:#64748B;--accent:#38BDF8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.03)1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px 16px;}
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;flex-wrap:wrap;gap:8px;}
  h1{font-size:clamp(14px,2vw,22px);font-weight:900;background:linear-gradient(135deg,#F1F5F9,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;}
  .sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px;}
  .update-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10B981;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
  .update-badge::before{content:'●';animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:20px;color:#EF4444;margin:20px 0;}
  .notice{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:8px;padding:8px 13px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px;line-height:1.7;}
  .page-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);overflow-x:auto;}
  .ptab{padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
  .ptab.on{color:var(--accent);border-bottom-color:var(--accent);}
  .page{display:none;}.page.on{display:block;}
  .ctrl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .ctrl-lbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
  .tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .tab{padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
  .tab.on{background:var(--accent);color:#0A0F1E;}
  .srcs{display:flex;gap:5px;flex-wrap:wrap;}
  .sb{padding:4px 10px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .2s;}
  .sb.on{color:#0A0F1E;border-color:transparent;}
  .yr-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .yr-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;transition:all .2s;}
  .yr-btn.on{background:var(--accent);color:#0A0F1E;border-color:var(--accent);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden;}
  .kpi-lbl{font-size:9px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .kpi-val{font-size:18px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
  .kpi-sub{font-size:9px;color:var(--muted);margin-top:3px;}
  .kpi-ico{position:absolute;top:10px;right:10px;font-size:14px;opacity:.4;}
  .slider-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .sl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .sl-yr{font-size:26px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
  .badge{font-size:9px;padding:3px 9px;border-radius:20px;font-weight:700;}
  .badge.act{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.3);}
  .badge.pln{background:rgba(56,189,248,.15);color:var(--accent);border:1px solid rgba(56,189,248,.3);}
  input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:linear-gradient(90deg,var(--accent) var(--pct,25%),rgba(255,255,255,.1) var(--pct,25%));border-radius:4px;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 10px rgba(56,189,248,.5);cursor:pointer;}
  .ticks{display:flex;justify-content:space-between;margin-top:5px;}
  .tick{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:15px;}
  .card-title{font-size:12px;font-weight:700;margin-bottom:2px;}
  .card-sub{font-size:9px;color:var(--muted);margin-bottom:10px;font-family:'DM Mono',monospace;}
  .snap-grid{display:grid;grid-template-columns:155px 1fr;gap:14px;align-items:center;}
  .pie-wrap{position:relative;height:150px;width:150px;margin:0 auto;}
  .pie-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
  .pie-mid-val{font-size:14px;font-weight:900;font-family:'DM Mono',monospace;}
  .pie-mid-lbl{font-size:8px;color:var(--muted);}
  .bars{display:flex;flex-direction:column;gap:7px;}
  .bar-row-lbl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;}
  .bar-name{font-weight:700;}.bar-val{font-family:'DM Mono',monospace;color:var(--muted);}
  .bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
  .bar-fg{height:100%;border-radius:3px;transition:width .4s ease;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media(max-width:700px){.g2,.g3{grid-template-columns:1fr;}}
  .mt{margin-top:12px;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px;}
  .leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);}
  .leg-dot{width:7px;height:7px;border-radius:50%;}
  .dam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-bottom:12px;}
  .dam-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;transition:all .2s;}
  .dam-card:hover{transform:translateY(-2px);border-color:var(--accent);}
  .dam-card.sel{border-color:var(--accent);background:#0F1E35;}
  .dam-name{font-size:11px;font-weight:700;margin-bottom:5px;}
  .dam-rate{font-size:18px;font-weight:900;font-family:'DM Mono',monospace;margin:3px 0;}
  .dam-info{font-size:9px;color:var(--muted);line-height:1.6;}
  .dbadge{display:inline-block;font-size:8px;padding:2px 7px;border-radius:10px;font-weight:700;margin-top:3px;}
  .db-ok{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.3);}
  .db-w{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3);}
  .db-d{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.3);}
  .foot{text-align:center;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
  .gn{color:#10B981;}.bl{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px;">데이터 로딩 중...</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// 데이터 로드 — GitHub Pages에서 data/dashboard_data.json 읽기
// 로컬 실행 시에는 fallback 데이터 사용
// ════════════════════════════════════════════════════
const DATA_URL = "./data/dashboard_data.json";
const TTP = {backgroundColor:'#1E293B',borderColor:'rgba(255,255,255,.1)',borderWidth:1};

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.warn("데이터 로드 실패, fallback 사용:", e.message);
    return null;
  }
}

function lerp(y, anc) {
  const ks = Object.keys(anc).map(Number).sort((a,b)=>a-b);
  if(y<=ks[0]) return anc[ks[0]];
  if(y>=ks[ks.length-1]) return anc[ks[ks.length-1]];
  for(let i=0;i<ks.length-1;i++){
    if(y>=ks[i]&&y<=ks[i+1]){
      const t=(y-ks[i])/(ks[i+1]-ks[i]);
      return +(anc[ks[i]]*(1-t)+anc[ks[i+1]]*t).toFixed(2);
    }
  }
}

function pct(v,t){return t>0?(v/t*100).toFixed(1)+'%':'-';}

// ─── 앱 초기화 ───────────────────────────────────────
async function init() {
  const raw = await loadData();

  // 데이터 파싱
  let plan, dams, regional, updatedAt;
  if(raw) {
    plan      = raw.plan;
    dams      = raw.dams;
    regional  = raw.regional;
    updatedAt = raw.meta?.updated_at || "알 수 없음";
  } else {
    // fallback: 빌트인 데이터
    plan      = FALLBACK_PLAN;
    dams      = FALLBACK_DAMS;
    regional  = FALLBACK_REGIONAL;
    updatedAt = "내장 데이터 (오프라인)";
  }

  // 앱 HTML 렌더
  document.getElementById("app").innerHTML = buildAppHTML(updatedAt);
  attachEventListeners(plan, dams, regional);
}

function buildAppHTML(updatedAt) {
  return `
  <div class="hdr">
    <div>
      <h1>🇰🇷 대한민국 에너지 Mix 인터랙티브 대시보드</h1>
      <div class="sub">SOURCE: EPSIS 한국전력통계 · 제11차 전력수급기본계획 · K-water 수자원공사 | 자동 업데이트</div>
    </div>
    <div class="update-badge">최종 업데이트: ${updatedAt}</div>
  </div>

  <div class="notice">
    📡 <b>자동 업데이트</b>: GitHub Actions가 매일 오전 9시(KST)에 공식 사이트에서 데이터를 수집해 갱신합니다.<br>
    실적(2018~현재): EPSIS · K-water 확정치 &nbsp;|&nbsp; 전망(~2038): 제11차 전력수급기본계획(2025.02 확정)
  </div>

  <div class="page-tabs">
    <button class="ptab on"  onclick="switchPage('mix',this)">⚡ 에너지 Mix (전국)</button>
    <button class="ptab"     onclick="switchPage('region',this)">🗺️ 지역별 발전·수요</button>
    <button class="ptab"     onclick="switchPage('water',this)">💧 용수 · 댐 현황</button>
  </div>

  <!-- PAGE 1: 에너지 Mix -->
  <div class="page on" id="pg-mix">
    <div class="ctrl-row">
      <span class="ctrl-lbl">VIEW</span>
      <div class="tabs">
        <button class="tab on" onclick="setView('gen',this)">발전량 (TWh)</button>
        <button class="tab" onclick="setView('cap',this)">설비용량 (GW)</button>
        <button class="tab" onclick="setView('pct',this)">발전비중 (%)</button>
      </div>
      <span class="ctrl-lbl" style="margin-left:6px;">에너지원</span>
      <div class="srcs" id="srcs"></div>
    </div>
    <div class="kpis" id="kpis"></div>
    <div class="slider-box">
      <div class="sl-top">
        <div><div class="sl-yr" id="yrDisp">2023</div><div style="font-size:10px;color:var(--muted);margin-top:1px;">연도별 스냅샷</div></div>
        <span class="badge act" id="yrBadge">● 실적</span>
      </div>
      <input type="range" id="sl" min="0" max="20" value="5" oninput="onSlide(this.value)">
      <div class="ticks"><span class="tick">2018</span><span class="tick">2022</span><span class="tick">2026</span><span class="tick">2030</span><span class="tick">2034</span><span class="tick">2038</span></div>
    </div>
    <div class="card">
      <div class="card-title" id="snapTitle">2023년 에너지원별 구성</div>
      <div class="card-sub" id="snapSub">EPSIS 확정치</div>
      <div class="snap-grid">
        <div class="pie-wrap"><canvas id="pieC"></canvas>
          <div class="pie-mid"><div class="pie-mid-val" id="pieVal">—</div><div class="pie-mid-lbl" id="pieLbl">합계</div></div>
        </div>
        <div class="bars" id="barList"></div>
      </div>
    </div>
    <div class="card mt">
      <div class="card-title">에너지원별 추이 (2018~2038)</div>
      <div class="card-sub" id="trendSub"></div>
      <div style="position:relative;height:250px;"><canvas id="trendC"></canvas></div>
      <div class="legend" id="leg"></div>
    </div>
    <div class="g3 mt">
      <div class="card"><div class="card-title">에너지원 비중 변화</div><div class="card-sub">발전 Mix (%)</div><div style="position:relative;height:190px;"><canvas id="stackC"></canvas></div></div>
      <div class="card"><div class="card-title">에너지원별 용량 변화</div><div class="card-sub">연말 정격용량 누적 (GW)</div><div style="position:relative;height:190px;"><canvas id="capC"></canvas></div></div>
      <div class="card"><div class="card-title">재생에너지 성장 추이</div><div class="card-sub">재생e+신e·수소 (TWh/%)</div><div style="position:relative;height:190px;"><canvas id="renewC"></canvas></div></div>
    </div>
  </div>

  <!-- PAGE 2: 지역별 -->
  <div class="page" id="pg-region">
    <div class="ctrl-row">
      <span class="ctrl-lbl">연도</span><div class="yr-btns" id="rYrBtns"></div>
      <span class="ctrl-lbl" style="margin-left:8px;">지표</span>
      <div class="tabs"><button class="tab on" onclick="setRMode('both',this)">발전+수요</button><button class="tab" onclick="setRMode('gen',this)">발전량</button><button class="tab" onclick="setRMode('dem',this)">수요</button></div>
    </div>
    <div class="kpis" id="rKpis"></div>
    <div class="card"><div class="card-title" id="rMainTitle">지역별 발전량 vs 수요</div><div class="card-sub">TWh · 수도권=서울+인천+경기</div><div style="position:relative;height:320px;"><canvas id="rMainC"></canvas></div></div>
    <div class="g2 mt">
      <div class="card"><div class="card-title">지역별 수급 자립도</div><div class="card-sub">발전량÷수요×100%</div><div style="position:relative;height:280px;"><canvas id="rGapC"></canvas></div></div>
      <div class="card"><div class="card-title" id="rPieTitle">수요 지역 비중</div><div class="card-sub">전국 대비 (%)</div><div style="position:relative;height:280px;"><canvas id="rPieC"></canvas></div></div>
    </div>
  </div>

  <!-- PAGE 3: 댐 -->
  <div class="page" id="pg-water">
    <div class="notice" id="damNotice">💧 실시간 저수율 데이터 로딩 중...</div>
    <div class="ctrl-row">
      <span class="ctrl-lbl">권역</span>
      <div class="tabs">
        <button class="tab on" onclick="setBasin('all',this)">전체</button>
        <button class="tab" onclick="setBasin('han',this)">한강</button>
        <button class="tab" onclick="setBasin('nak',this)">낙동강</button>
        <button class="tab" onclick="setBasin('geum',this)">금강</button>
        <button class="tab" onclick="setBasin('sum',this)">섬진강</button>
      </div>
    </div>
    <div class="dam-grid" id="damCards"></div>
    <div class="g2 mt">
      <div class="card"><div class="card-title" id="damRateTitle">소양강댐 — 연도별 저수율</div><div class="card-sub">% · K-water 수문운영정보</div><div style="position:relative;height:200px;"><canvas id="damRateC"></canvas></div></div>
      <div class="card"><div class="card-title">주요 댐 저수율 비교</div><div class="card-sub">% · 당일 현황</div><div style="position:relative;height:200px;"><canvas id="allDamC"></canvas></div></div>
    </div>
  </div>

  <div class="foot">
    <span class="gn">■ 실적</span> EPSIS (epsis.kpx.or.kr) &nbsp;|&nbsp;
    <span class="bl">■ 전망</span> 제11차 전력수급기본계획 (공고 제2025-169호) &nbsp;|&nbsp;
    💧 K-water · 환경부 국가가뭄정보포털 &nbsp;|&nbsp;
    🤖 GitHub Actions 자동 업데이트
  </div>`;
}

// ─── 이벤트 및 차트 로직 ─────────────────────────────
let planData, damsData, regionalData;
let view='gen', selYr=2023, active;
let rMode='both', selRYr=2024, selBasin='all', selDam=null;
let charts={};

const GEN_SRCS=[
  {id:'nuclear',lbl:'원자력',clr:'#3B82F6'},
  {id:'coal',lbl:'석탄',clr:'#6B7280'},
  {id:'lng',lbl:'LNG',clr:'#F59E0B'},
  {id:'renew',lbl:'재생e',clr:'#10B981'},
  {id:'shin',lbl:'신e·수소',clr:'#A78BFA'},
  {id:'other',lbl:'기타',clr:'#94A3B8'},
];
const CAP_SRCS=[
  {id:'nuclear',lbl:'원자력',clr:'#3B82F6'},
  {id:'coal',lbl:'석탄',clr:'#6B7280'},
  {id:'lng',lbl:'LNG',clr:'#F59E0B'},
  {id:'renew',lbl:'재생e',clr:'#10B981'},
  {id:'shin',lbl:'신e·수소',clr:'#A78BFA'},
  {id:'pumped',lbl:'양수',clr:'#06B6D4'},
  {id:'other',lbl:'기타',clr:'#94A3B8'},
];

function attachEventListeners(plan, dams, regional) {
  planData = plan;
  damsData = dams;
  regionalData = regional;
  active = new Set(GEN_SRCS.map(s=>s.id));

  initSrcBtns();
  onSlide(5);
  drawTrend(); drawStack(); drawCap(); drawRenew();
}

function switchPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on'); el.classList.add('on');
  if(id==='region') initRegion();
  if(id==='water')  initWater();
}

function initSrcBtns(){
  const w=document.getElementById('srcs'); w.innerHTML='';
  GEN_SRCS.forEach(s=>{
    const b=document.createElement('button');
    b.className='sb on'; b.textContent=s.lbl;
    b.style.background=s.clr; b.style.borderColor=s.clr;
    b.onclick=()=>toggleSrc(s.id,b,s.clr); w.appendChild(b);
  });
}
function toggleSrc(id,btn,clr){
  if(active.has(id)){if(active.size===1)return;active.delete(id);btn.classList.remove('on');btn.style.background='transparent';btn.style.color=clr;}
  else{active.add(id);btn.classList.add('on');btn.style.background=clr;btn.style.color='#0A0F1E';}
  redrawMix();
}

function getGenArr(srcId){return planData.generation[srcId]||[];}

function getChartData(){
  if(view==='gen') return {data:Object.fromEntries(GEN_SRCS.map(s=>[s.id,getGenArr(s.id)])),unit:'TWh'};
  if(view==='cap') return {data:Object.fromEntries(CAP_SRCS.map(s=>[s.id,getCapArr(s.id)])),unit:'GW'};
  const tots=planData.years.map((_,i)=>GEN_SRCS.reduce((a,s)=>a+(getGenArr(s.id)[i]||0),0));

  GEN_SRCS.forEach(s=>{pctData[s.id]=planData.years.map((_,i)=>tots[i]>0?+((getGenArr(s.id)[i]||0)/tots[i]*100).toFixed(1):0);});

}

function drawKPI(){
  const yi=planData.years.indexOf(selYr);
  const gen=Object.fromEntries(GEN_SRCS.map(s=>[s.id,getGenArr(s.id)[yi]||0]));
  const tot=GEN_SRCS.filter(s=>active.has(s.id)).reduce((a,s)=>a+gen[s.id],0);

    {lbl:'총 발전량',val:tot.toFixed(1)+' TWh',sub:selYr+'년',clr:'#38BDF8',ico:'⚡'},
    {lbl:'원자력',val:(gen.nuclear||0).toFixed(1)+' TWh',sub:pct(gen.nuclear,tot),clr:'#3B82F6',ico:'⚛️'},
    {lbl:'석탄',val:(gen.coal||0).toFixed(1)+' TWh',sub:pct(gen.coal,tot),clr:'#6B7280',ico:'🏭'},
    {lbl:'LNG',val:(gen.lng||0).toFixed(1)+' TWh',sub:pct(gen.lng,tot),clr:'#F59E0B',ico:'🔥'},
    {lbl:'재생e',val:(gen.renew||0).toFixed(1)+' TWh',sub:pct(gen.renew,tot),clr:'#10B981',ico:'🌿'},

  document.getElementById('kpis').innerHTML=items.map(it=>`

function renderDamCards(){
  const filtered=selBasin==='all'?Object.keys(DAM_META):Object.keys(DAM_META).filter(k=>DAM_META[k].basin===selBasin);
  document.getElementById('damCards').innerHTML=filtered.map(name=>{

    const rc=r>=60?'#10B981':r>=40?'#F59E0B':'#EF4444';
    const bc=r>=60?'db-ok':r>=40?'db-w':'db-d';
    const bt=r>=60?'안정':r>=40?'주의':'위험';
    const isSel=selDam===name;
    const live=getLiveRate(name);
    return `<div class="dam-card${isSel?' sel':''}" onclick="selectDam('${name}')">
      <div class="dam-name">${name}댐 ${live?'<span style="font-size:8px;color:#10B981">● 실시간</span>':''}</div>
      <div class="dam-rate" style="color:${rc}">${r!==null?r+'%':'—'}</div>

      <div style="margin-top:3px;display:flex;gap:3px;flex-wrap:wrap;">

}

function drawDamDetail(name){
  document.getElementById('damRateTitle').textContent=`${name}댐 — 연도별 저수율`;
  const hist=DAM_HIST[name]||{};
  const live=getLiveRate(name);
  const yrs=Object.keys(hist).map(Number).sort((a,b)=>a-b);
  const vals=yrs.map(y=>hist[y]);
  // 실시간 데이터가 있으면 올해 값 업데이트
  const thisYear=new Date().getFullYear();
  if(live&&!hist[thisYear]){yrs.push(thisYear);vals.push(live);}
  const colors=vals.map(r=>r>=60?'#10B98199':r>=40?'#F59E0B99':'#EF444499');
  const borders=vals.map(r=>r>=60?'#10B981':r>=40?'#F59E0B':'#EF4444');
  if(charts.damRate)charts.damRate.destroy();
  charts.damRate=new Chart(document.getElementById('damRateC').getContext('2d'),{
    type:'bar',data:{labels:yrs,datasets:[{data:vals,backgroundColor:colors,borderColor:borders,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TTP,callbacks:{label:c=>`  저수율: ${c.raw}%`}}},
      scales:{x:{grid:{display:false},ticks:{color:'#64748B',font:{family:'DM Mono',size:9}}},y:{grid:{color:'rgba(255,255,255,.04)'},max:100,ticks:{color:'#64748B',font:{family:'DM Mono',size:9},callback:v=>v+'%'}}}}
  });
}
function drawAllDam(){
  const major=['소양강','충주','안동','대청','보령','주암'];
  const cols=['#3B82F6','#10B981','#F59E0B','#A78BFA','#EF4444','#06B6D4'];
  const yrs=[2018,2019,2020,2021,2022,2023,2024];
  if(charts.allDam)charts.allDam.destroy();
  charts.allDam=new Chart(document.getElementById('allDamC').getContext('2d'),{
    type:'bar',
    data:{labels:major,datasets:[{
      label:'저수율(%)',
      data:major.map(n=>getBestRate(n)||0),
      backgroundColor:major.map((n,i)=>{const r=getBestRate(n)||0;return r>=60?cols[i]+'CC':r>=40?cols[i]+'88':cols[i]+'55';}),
      borderColor:major.map((n,i)=>cols[i]),borderWidth:1.5,borderRadius:4,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TTP,callbacks:{label:c=>`  ${c.label}댐: ${c.raw}%`}}},
      scales:{x:{grid:{display:false},ticks:{color:'#F1F5F9',font:{family:'Noto Sans KR',size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},max:100,ticks:{color:'#64748B',font:{family:'DM Mono',size:9},callback:v=>v+'%'}}}}
  });
}
