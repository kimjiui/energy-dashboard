# .github/workflows/update_data.yml
# ─────────────────────────────────────────────────────
# 매일 오전 9시(KST) 자동 실행 → 데이터 수집 → GitHub에 커밋
# GitHub Actions 무료 티어: 월 2,000분 (충분)

name: 🔄 Daily Data Update

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = KST 09:00 매일
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # data/ 폴더에 커밋하기 위한 권한

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 패키지 설치
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 🚀 데이터 수집 실행
        env:
          EPSIS_API_KEY: ${{ secrets.EPSIS_API_KEY }}   # GitHub 저장소 Settings → Secrets에 등록
        run: |
          python scripts/fetch_data.py

      - name: 💾 데이터 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "📊 Auto-update: $(date '+%Y-%m-%d %H:%M KST')"
          git push
